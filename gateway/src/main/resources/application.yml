server:
  port: 8080
logging:
  level:
    org.springframework.cloud.gateway: WARN
    reactor.netty: WARN
spring:
  config:
    import:
      - optional:classpath:application-secret.yml
  application:
    name: gateway
  data:
    redis:
      host: 192.168.150.101
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.150.101:8848
        namespace: public
        group: DEFAULT_GROUP
        service: gateway
      config:
        server-addr: 192.168.150.101:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yml
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            # TODO 生产环境需替换为具体前端域名，如 "https://trade.example.com"
            allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:*}"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "Authorization,Content-Type,token,X-Gateway-Auth"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: item-service
          uri: lb://item-service
          predicates:
            - Path=/user/item/**,/user/category/**,/user/review/**,/home/**
          order: 10

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/user/order/**
          order: 10

        - id: wallet-service
          uri: lb://wallet-service
          predicates:
            - Path=/user/wallet/**
          order: 10

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/user/chat/**,/user/chat-message/**,/user/chat-conversation/**,/ws/**
          order: 10

        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/search/**
          order: 10

        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**,/admin-logs/**
          order: 20

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
          order: 100

